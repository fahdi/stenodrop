name: test

on:
  push:
    branches: [main]
    paths: ['mac/**', 'desktop/**', '.github/workflows/**']
  pull_request:
    paths: ['mac/**', 'desktop/**', '.github/workflows/**']

jobs:
  mac-swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build Swift app
        run: cd mac && swift build

  desktop-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux webkit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Test
        run: cd desktop/src-tauri && cargo test
